name: Release Test - Docker to Scaleway (Kaniko/Crane)

on:
    workflow_dispatch:

jobs:
    docker-build-and-push-test:
        runs-on: codeberg-medium
        container:
            image: gcr.io/kaniko-project/executor:debug
        steps:
            - name: Compute image tags
              id: meta
              run: |
                  set -euo pipefail
                  SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
                  echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "TEST_TAG=test-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

            - name: Build and push test image with Kaniko
              env:
                  SHORT_SHA: ${{ steps.meta.outputs.SHORT_SHA }}
                  TEST_TAG: ${{ steps.meta.outputs.TEST_TAG }}
                  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
                  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  IMAGE_BASE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/hex-core-service"
                  AUTH="$(printf '%s:%s' "${REGISTRY_USERNAME}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')"
                  CONTEXT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git#${GITHUB_SHA}"
                  if [ -n "${CI_PUSH_TOKEN:-}" ]; then
                    CONTEXT_URL="https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git#${GITHUB_SHA}"
                  fi
                  mkdir -p /kaniko/.docker
                  cat > /kaniko/.docker/config.json <<EOF
                  {"auths":{"${REGISTRY_HOST}":{"auth":"${AUTH}"}}}
                  EOF
                  /kaniko/executor \
                    --context "${CONTEXT_URL}" \
                    --dockerfile "Dockerfile" \
                    --destination "${IMAGE_BASE}:${SHORT_SHA}" \
                    --destination "${IMAGE_BASE}:${TEST_TAG}"

    docker-tag-test-latest:
        runs-on: codeberg-small
        needs:
            - docker-build-and-push-test
        container:
            image: gcr.io/go-containerregistry/crane:debug
        steps:
            - name: Compute image tags
              id: meta
              run: |
                  set -euo pipefail
                  SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
                  echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "TEST_TAG=test-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

            - name: Tag test-latest with Crane
              env:
                  SHORT_SHA: ${{ steps.meta.outputs.SHORT_SHA }}
                  TEST_TAG: ${{ steps.meta.outputs.TEST_TAG }}
                  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
                  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
              run: |
                  set -euo pipefail
                  IMAGE_BASE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/hex-core-service"
                  crane auth login -u "${REGISTRY_USERNAME}" -p "${REGISTRY_PASSWORD}" "${REGISTRY_HOST}"
                  crane copy "${IMAGE_BASE}:${SHORT_SHA}" "${IMAGE_BASE}:test-latest"
                  echo "Pushed:"
                  echo "${IMAGE_BASE}:${SHORT_SHA}"
                  echo "${IMAGE_BASE}:${TEST_TAG}"
                  echo "${IMAGE_BASE}:test-latest"
