name: Release Test - Docker to Scaleway

on:
    workflow_dispatch:

jobs:
    docker-build-and-push:
        runs-on: codeberg-medium
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Select container engine
              run: |
                  set -euo pipefail
                  if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
                    echo "CONTAINER_CLI=docker" >> "$GITHUB_ENV"
                    exit 0
                  fi
                  if command -v podman >/dev/null 2>&1; then
                    echo "CONTAINER_CLI=podman" >> "$GITHUB_ENV"
                    exit 0
                  fi
                  echo "No usable container engine found (docker daemon unavailable and podman missing)."
                  exit 1

            - name: Compute image tags
              id: meta
              run: |
                  set -euo pipefail
                  SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
                  echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "TEST_TAG=test-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

            - name: Build container image
              run: |
                  set -euo pipefail
                  ${CONTAINER_CLI} build \
                    -t ${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_NAMESPACE }}/hex-core-service:${{ steps.meta.outputs.SHORT_SHA }} \
                    -t ${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_NAMESPACE }}/hex-core-service:${{ steps.meta.outputs.TEST_TAG }} \
                    .

            - name: Log in to container registry
              run: echo "${{ secrets.REGISTRY_PASSWORD }}" | ${CONTAINER_CLI} login ${{ vars.REGISTRY_HOST }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

            - name: Push container image tags
              run: |
                  set -euo pipefail
                  ${CONTAINER_CLI} push ${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_NAMESPACE }}/hex-core-service:${{ steps.meta.outputs.SHORT_SHA }}
                  ${CONTAINER_CLI} push ${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_NAMESPACE }}/hex-core-service:${{ steps.meta.outputs.TEST_TAG }}

            - name: Output published references
              run: |
                  echo "Built image tags:"
                  echo "${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_NAMESPACE }}/hex-core-service:${{ steps.meta.outputs.SHORT_SHA }}"
                  echo "${{ vars.REGISTRY_HOST }}/${{ vars.REGISTRY_NAMESPACE }}/hex-core-service:${{ steps.meta.outputs.TEST_TAG }}"
