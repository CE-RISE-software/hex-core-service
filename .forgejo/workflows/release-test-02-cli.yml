name: Release Test 02 - CLI Binaries

on:
    workflow_dispatch:

jobs:
    cli-binaries:
        runs-on: codeberg-tiny
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-musl
                      archive_suffix: linux-x86_64
                      binary_suffix: ""
                    - target: x86_64-apple-darwin
                      archive_suffix: macos-x86_64
                      binary_suffix: ""
                    - target: x86_64-pc-windows-gnu
                      archive_suffix: windows-x86_64
                      binary_suffix: .exe
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install Rust toolchain
              run: |
                  set -euo pipefail
                  if ! command -v rustup >/dev/null 2>&1; then
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustc --version
                  cargo --version

            - name: Install Zig
              run: |
                  set -euo pipefail
                  ZIG_VERSION=0.13.0
                  curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
                  mkdir -p /tmp/zig
                  tar -xf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
                  echo "/tmp/zig" >> "$GITHUB_PATH"
                  /tmp/zig/zig version

            - name: Install cargo-zigbuild
              run: cargo install --locked cargo-zigbuild

            - name: Build hex-cli
              run: cargo zigbuild --release -p hex-cli --target ${{ matrix.target }}
              env:
                  RUSTFLAGS: "-D warnings"

            - name: Package CLI archive
              env:
                  VERSION: test-cli-${{ github.run_number }}
              run: |
                  set -euo pipefail
                  BIN_NAME="hex-cli${{ matrix.binary_suffix }}"
                  DIST_NAME="hex-cli-${VERSION}-${{ matrix.archive_suffix }}"
                  mkdir -p dist
                  cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
                  (cd dist && tar -czf "${DIST_NAME}.tar.gz" "${BIN_NAME}")

            - name: Upload CLI archive
              uses: https://github.com/actions/upload-artifact@v3
              with:
                  name: release-test-cli-${{ matrix.archive_suffix }}-${{ github.run_number }}
                  path: dist/*.tar.gz
