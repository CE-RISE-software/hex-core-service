name: OpenAPI CI

on:
    push:
    pull_request:

jobs:
    openapi-json:
        runs-on: codeberg-small
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Java
              uses: https://github.com/actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Node.js
              uses: https://github.com/actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Create OpenAPI JSON outputs
              run: |
                  set -euo pipefail
                  mkdir -p dist/openapi
                  cp crates/api/src/openapi.json dist/openapi/openapi.json
                  cp crates/io-http/src/io_adapter_openapi.json dist/openapi/io-adapter-openapi.json

            - name: Validate OpenAPI JSON
              run: |
                  set -euo pipefail
                  npx -y @openapitools/openapi-generator-cli@2.15.3 version-manager set 7.10.0
                  npx -y @openapitools/openapi-generator-cli@2.15.3 validate -i dist/openapi/openapi.json
                  npx -y @openapitools/openapi-generator-cli@2.15.3 validate -i dist/openapi/io-adapter-openapi.json
