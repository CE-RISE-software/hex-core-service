name: Release Test 01 - OpenAPI Export

on:
    workflow_dispatch:

jobs:
    openapi-export:
        runs-on: codeberg-tiny
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Export OpenAPI artifacts
              env:
                  VERSION: test-openapi-${{ github.run_number }}
              run: |
                  set -euo pipefail
                  mkdir -p dist/openapi
                  cp crates/api/src/openapi.json "dist/openapi/openapi-${VERSION}.json"
                  cp crates/io-http/src/io_adapter_openapi.json "dist/openapi/io-adapter-openapi-${VERSION}.json"

            - name: Upload OpenAPI artifacts
              uses: https://github.com/actions/upload-artifact@v4
              with:
                  name: release-test-openapi-${{ github.run_number }}
                  path: dist/openapi/*
