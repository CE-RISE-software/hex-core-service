name: Sync SDK Repos on OpenAPI Change

on:
    push:
        branches:
            - "**"
        paths:
            - "crates/api/src/openapi.json"

jobs:
    sync-sdks:
        runs-on: codeberg-medium
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Java
              uses: https://github.com/actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Node.js
              uses: https://github.com/actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Generate Go, TypeScript, and Python SDKs
              run: |
                  set -euo pipefail
                  TS_VERSION="0.0.0-commit.${GITHUB_RUN_NUMBER}"
                  PY_VERSION="0.0.0.dev${GITHUB_RUN_NUMBER}"
                  GO_VERSION="0.0.0-commit.${GITHUB_RUN_NUMBER}"
                  mkdir -p dist/sdks

                  npx -y @openapitools/openapi-generator-cli@2.15.3 version-manager set 7.10.0

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g go \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/go" \
                    --additional-properties=packageName=hexcoresdk,enumClassPrefix=true,packageVersion="${GO_VERSION}"

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g typescript-fetch \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/typescript" \
                    --additional-properties=npmName=@ce-rise/hex-core-sdk,npmVersion="${TS_VERSION}",supportsES6=true,typescriptThreePlus=true

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g python \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/python" \
                    --additional-properties=packageName=ce_rise_hex_core_sdk,projectName=ce-rise-hex-core-sdk,packageVersion="${PY_VERSION}"

            - name: Publish Go SDK to external repo
              env:
                  GO_SDK_REPO: ${{ vars.GO_SDK_REPO }}
                  GO_SDK_BRANCH: ${{ vars.GO_SDK_BRANCH }}
                  GO_SDK_GIT_HOST: ${{ vars.GO_SDK_GIT_HOST }}
                  GO_SDK_TARGET_DIR: ${{ vars.GO_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${GO_SDK_BRANCH:-main}"
                  HOST="${GO_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${GO_SDK_TARGET_DIR:-.}"
                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/go"

                  if [ -z "${GO_SDK_REPO:-}" ]; then
                    echo "GO_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-go)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${GO_SDK_REPO}.git" /tmp/go-sdk-repo
                  cd /tmp/go-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  mkdir -p "${TARGET_DIR}"
                  for d in api model .openapi-generator docs test; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  rm -f "${TARGET_DIR}"/*.go "${TARGET_DIR}/go.mod" "${TARGET_DIR}/go.sum"
                  for d in api model .openapi-generator docs test; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done
                  shopt -s nullglob
                  for f in "${SRC_DIR}"/*.go "${SRC_DIR}/go.mod" "${SRC_DIR}/go.sum"; do
                    if [ -e "${f}" ]; then
                      cp "${f}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in api model .openapi-generator docs test go.mod go.sum *.go; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No Go SDK changes to publish"
                  else
                    git commit -m "chore(sdk-go): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                    git push origin "${BRANCH}"
                  fi

            - name: Publish TypeScript SDK to external repo
              env:
                  TS_SDK_REPO: ${{ vars.TS_SDK_REPO }}
                  TS_SDK_BRANCH: ${{ vars.TS_SDK_BRANCH }}
                  TS_SDK_GIT_HOST: ${{ vars.TS_SDK_GIT_HOST }}
                  TS_SDK_TARGET_DIR: ${{ vars.TS_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${TS_SDK_BRANCH:-main}"
                  HOST="${TS_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${TS_SDK_TARGET_DIR:-.}"
                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/typescript"

                  if [ -z "${TS_SDK_REPO:-}" ]; then
                    echo "TS_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-typescript)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${TS_SDK_REPO}.git" /tmp/ts-sdk-repo
                  cd /tmp/ts-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  mkdir -p "${TARGET_DIR}"
                  for d in src test docs .openapi-generator; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  rm -f \
                    "${TARGET_DIR}/package.json" \
                    "${TARGET_DIR}/tsconfig.json" \
                    "${TARGET_DIR}/tsconfig.esm.json" \
                    "${TARGET_DIR}/.openapi-generator-ignore"
                  for d in src test docs .openapi-generator; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done
                  for f in package.json tsconfig.json tsconfig.esm.json .openapi-generator-ignore; do
                    if [ -f "${SRC_DIR}/${f}" ]; then
                      cp "${SRC_DIR}/${f}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in src test docs .openapi-generator package.json tsconfig.json tsconfig.esm.json .openapi-generator-ignore; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No TypeScript SDK changes to publish"
                  else
                    git commit -m "chore(sdk-ts): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                    git push origin "${BRANCH}"
                  fi

            - name: Publish Python SDK to external repo
              env:
                  PY_SDK_REPO: ${{ vars.PY_SDK_REPO }}
                  PY_SDK_BRANCH: ${{ vars.PY_SDK_BRANCH }}
                  PY_SDK_GIT_HOST: ${{ vars.PY_SDK_GIT_HOST }}
                  PY_SDK_TARGET_DIR: ${{ vars.PY_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${PY_SDK_BRANCH:-main}"
                  HOST="${PY_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${PY_SDK_TARGET_DIR:-.}"
                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/python"

                  if [ -z "${PY_SDK_REPO:-}" ]; then
                    echo "PY_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-python)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${PY_SDK_REPO}.git" /tmp/py-sdk-repo
                  cd /tmp/py-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  mkdir -p "${TARGET_DIR}"
                  for d in ce_rise_hex_core_sdk test docs .openapi-generator; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  rm -f \
                    "${TARGET_DIR}/pyproject.toml" \
                    "${TARGET_DIR}/setup.py" \
                    "${TARGET_DIR}/requirements.txt" \
                    "${TARGET_DIR}/requirements-dev.txt" \
                    "${TARGET_DIR}/.openapi-generator-ignore"
                  for d in ce_rise_hex_core_sdk test docs .openapi-generator; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done
                  for f in pyproject.toml setup.py requirements.txt requirements-dev.txt .openapi-generator-ignore; do
                    if [ -f "${SRC_DIR}/${f}" ]; then
                      cp "${SRC_DIR}/${f}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in ce_rise_hex_core_sdk test docs .openapi-generator pyproject.toml setup.py requirements.txt requirements-dev.txt .openapi-generator-ignore; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No Python SDK changes to publish"
                  else
                    git commit -m "chore(sdk-py): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                    git push origin "${BRANCH}"
                  fi
