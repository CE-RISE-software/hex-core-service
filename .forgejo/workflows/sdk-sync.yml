name: Sync SDK Repos on OpenAPI Change

on:
    push:
        branches:
            - "**"
        paths:
            - "crates/api/src/openapi.json"

jobs:
    sync-sdks:
        runs-on: codeberg-medium
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Java
              uses: https://github.com/actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Node.js
              uses: https://github.com/actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup Go
              uses: https://github.com/actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Setup Python
              uses: https://github.com/actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Generate Go, TypeScript, and Python SDKs
              run: |
                  set -euo pipefail
                  OPENAPI_VERSION="$(python - <<'PY'
                  import json
                  from pathlib import Path
                  data = json.loads(Path("crates/api/src/openapi.json").read_text())
                  print(data["info"]["version"])
                  PY
                  )"
                  if [ -z "${OPENAPI_VERSION}" ]; then
                    echo "Could not read info.version from crates/api/src/openapi.json"
                    exit 1
                  fi
                  export OPENAPI_VERSION
                  TS_VERSION="${OPENAPI_VERSION}"
                  PY_VERSION="${OPENAPI_VERSION}"
                  GO_VERSION="${OPENAPI_VERSION}"
                  mkdir -p dist/sdks

                  npx -y @openapitools/openapi-generator-cli@2.15.3 version-manager set 7.10.0

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g go \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/go" \
                    --git-user-id CE-RISE-software \
                    --git-repo-id hex-core-sdk-go \
                    --additional-properties=packageName=hexcoresdk,enumClassPrefix=true,packageVersion="${GO_VERSION}"

                  # Resolve generated test dependencies (e.g. testify) in go.mod/go.sum.
                  (cd dist/sdks/go && go mod tidy)

                  # Replace generator placeholder tests (t.Skip) with executable smoke tests.
                  rm -f dist/sdks/go/test/api_*_test.go || true
                  mkdir -p dist/sdks/go/test
                  cat > dist/sdks/go/test/api_smoke_test.go <<'EOF'
                  package hexcoresdk

                  import (
                  	"context"
                  	"net/http"
                  	"net/http/httptest"
                  	"testing"

                  	"github.com/stretchr/testify/require"
                  	openapiclient "github.com/CE-RISE-software/hex-core-sdk-go"
                  )

                  func TestSmoke_AdminHealth(t *testing.T) {
                  	srv := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                  		require.Equal(t, "/admin/health", r.URL.Path)
                  		w.Header().Set("Content-Type", "application/json")
                  		_, _ = w.Write([]byte(`{"status":"ok"}`))
                  	}))
                  	defer srv.Close()

                  	cfg := openapiclient.NewConfiguration()
                  	cfg.Servers = openapiclient.ServerConfigurations{{URL: srv.URL}}
                  	client := openapiclient.NewAPIClient(cfg)

                  	resp, httpRes, err := client.AdminAPI.Health(context.Background()).Execute()
                  	require.NoError(t, err)
                  	require.NotNil(t, httpRes)
                  	require.Equal(t, 200, httpRes.StatusCode)
                  	require.NotNil(t, resp)
                  }

                  func TestSmoke_DiscoveryListModels(t *testing.T) {
                  	srv := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                  		require.Equal(t, "/models", r.URL.Path)
                  		w.Header().Set("Content-Type", "application/json")
                  		_, _ = w.Write([]byte(`{"models":[{"id":"demo-model","version":"0.0.1"}]}`))
                  	}))
                  	defer srv.Close()

                  	cfg := openapiclient.NewConfiguration()
                  	cfg.Servers = openapiclient.ServerConfigurations{{URL: srv.URL}}
                  	client := openapiclient.NewAPIClient(cfg)

                  	resp, httpRes, err := client.DiscoveryAPI.ListModels(context.Background()).Execute()
                  	require.NoError(t, err)
                  	require.NotNil(t, httpRes)
                  	require.Equal(t, 200, httpRes.StatusCode)
                  	require.NotNil(t, resp)
                  }
                  EOF

                  (cd dist/sdks/go && go test ./... -v)

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g typescript-fetch \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/typescript" \
                    --additional-properties=npmName=@ce-rise/hex-core-sdk,npmVersion="${TS_VERSION}",supportsES6=true,typescriptThreePlus=true

                  # Generate docs/tests from the generated TypeScript SDK code layout.
                  node <<'EOF'
                  const fs = require("fs");
                  const path = require("path");

                  const sdkRoot = path.join("dist", "sdks", "typescript");
                  const srcApis = path.join(sdkRoot, "src", "apis");
                  const srcModels = path.join(sdkRoot, "src", "models");
                  const docsRoot = path.join(sdkRoot, "docs");
                  const testRoot = path.join(sdkRoot, "test");
                  const docsApis = path.join(docsRoot, "apis");
                  const docsModels = path.join(docsRoot, "models");
                  const testApis = path.join(testRoot, "apis");
                  const testModels = path.join(testRoot, "models");

                  const listTs = (dir) =>
                    fs.existsSync(dir)
                      ? fs.readdirSync(dir)
                          .filter((f) => f.endsWith(".ts") && !f.toLowerCase().includes("index"))
                          .map((f) => path.basename(f, ".ts"))
                          .sort()
                      : [];

                  const apis = listTs(srcApis);
                  const models = listTs(srcModels);
                  const modelMeta = models.map((name) => {
                    const file = path.join(srcModels, `${name}.ts`);
                    const content = fs.existsSync(file) ? fs.readFileSync(file, "utf8") : "";
                    const isEnum =
                      new RegExp(`export\\s+const\\s+${name}\\b`).test(content) ||
                      new RegExp(`export\\s+enum\\s+${name}\\b`).test(content);
                    const hasInstanceOf = new RegExp(`\\binstanceOf${name}\\b`).test(content);
                    const hasFromJSON = new RegExp(`\\b${name}FromJSON\\b`).test(content);
                    const hasToJSON = new RegExp(`\\b${name}ToJSON\\b`).test(content);
                    const isInterfaceLike =
                      new RegExp(`export\\s+interface\\s+${name}\\b`).test(content) ||
                      new RegExp(`export\\s+type\\s+${name}\\b`).test(content);

                    let kind = "unknown";
                    if (isEnum) {
                      kind = "enum";
                    } else if (isInterfaceLike || hasInstanceOf || hasFromJSON || hasToJSON) {
                      kind = "object";
                    }

                    return { name, kind, hasInstanceOf, hasFromJSON, hasToJSON };
                  });

                  fs.mkdirSync(docsApis, { recursive: true });
                  fs.mkdirSync(docsModels, { recursive: true });
                  fs.mkdirSync(testApis, { recursive: true });
                  fs.mkdirSync(testModels, { recursive: true });
                  fs.rmSync(testApis, { recursive: true, force: true });
                  fs.rmSync(testModels, { recursive: true, force: true });
                  fs.mkdirSync(testApis, { recursive: true });
                  fs.mkdirSync(testModels, { recursive: true });

                  const indexDoc = [
                    "# TypeScript SDK",
                    "",
                    "Generated from `crates/api/src/openapi.json`.",
                    "",
                    "## API Modules",
                    ...apis.map((n) => `- [${n}](apis/${n}.md)`),
                    "",
                    "## Model Modules",
                    ...models.map((n) => `- [${n}](models/${n}.md)`),
                    ""
                  ].join("\n");
                  fs.writeFileSync(path.join(docsRoot, "README.md"), indexDoc, "utf8");

                  for (const name of apis) {
                    fs.writeFileSync(
                      path.join(docsApis, `${name}.md`),
                      `# API: ${name}\n\nAuto-generated API module from OpenAPI.\n`,
                      "utf8"
                    );
                    fs.writeFileSync(
                      path.join(testApis, `${name}.test.ts`),
                      `import * as Apis from "../../src/apis";\n\ndescribe("api export: ${name}", () => {\n  it("is exported", () => {\n    expect((Apis as Record<string, unknown>)["${name}"]).toBeDefined();\n  });\n});\n`,
                      "utf8"
                    );
                  }

                  for (const meta of modelMeta) {
                    const name = meta.name;
                    fs.writeFileSync(
                      path.join(docsModels, `${name}.md`),
                      `# Model: ${name}\n\nAuto-generated model module from OpenAPI.\n`,
                      "utf8"
                    );
                    if (meta.kind === "enum") {
                      fs.writeFileSync(
                        path.join(testModels, `${name}.test.ts`),
                        `import * as Models from "../../src/models";\n\ndescribe("enum export: ${name}", () => {\n  it("exports enum object at runtime", () => {\n    expect((Models as Record<string, unknown>)["${name}"]).toBeDefined();\n  });\n});\n`,
                        "utf8"
                      );
                    } else if (meta.kind === "object") {
                      fs.writeFileSync(
                        path.join(testModels, `${name}.test.ts`),
                        `import * as Models from "../../src/models";\n\ndescribe("model helpers: ${name}", () => {\n  it("exports runtime helper functions", () => {\n    expect((Models as Record<string, unknown>)["instanceOf${name}"]).toBeDefined();\n    expect((Models as Record<string, unknown>)["${name}FromJSON"]).toBeDefined();\n    expect((Models as Record<string, unknown>)["${name}ToJSON"]).toBeDefined();\n  });\n});\n`,
                        "utf8"
                      );
                    } else {
                      fs.writeFileSync(
                        path.join(testModels, `${name}.test.ts`),
                        `describe("model shape: ${name}", () => {\n  it("is categorized as unknown runtime shape", () => {\n    expect(true).toBe(true);\n  });\n});\n`,
                        "utf8"
                      );
                    }
                  }

                  const objectModels = modelMeta.filter((m) => m.kind === "object").map((m) => m.name);
                  const enumModels = modelMeta.filter((m) => m.kind === "enum").map((m) => m.name);
                  fs.writeFileSync(
                    path.join(testRoot, "model-kinds.acceptance.test.ts"),
                    `describe("typescript-fetch model coverage", () => {\n  it("has at least one object model", () => {\n    expect(${JSON.stringify(objectModels)}.length).toBeGreaterThan(0);\n  });\n  it("enum model coverage is valid", () => {\n    const enums = ${JSON.stringify(enumModels)};\n    if (enums.length === 0) {\n      expect(true).toBe(true);\n      return;\n    }\n    expect(enums.length).toBeGreaterThan(0);\n  });\n});\n`,
                    "utf8"
                  );
                  EOF

                  # Ensure generated TypeScript SDK can execute tests in CI.
                  cat > dist/sdks/typescript/jest.config.cjs <<'EOF'
                  module.exports = {
                    preset: "ts-jest",
                    testEnvironment: "node",
                    roots: ["<rootDir>/test"],
                    testMatch: ["**/*.test.ts"],
                  };
                  EOF
                  node <<'EOF'
                  const fs = require("fs");
                  const pkgPath = "dist/sdks/typescript/package.json";
                  const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
                  pkg.scripts = pkg.scripts || {};
                  pkg.scripts.test = "jest --runInBand";
                  pkg.devDependencies = pkg.devDependencies || {};
                  if (!pkg.devDependencies.jest) pkg.devDependencies.jest = "^29.7.0";
                  if (!pkg.devDependencies["ts-jest"]) pkg.devDependencies["ts-jest"] = "^29.2.5";
                  if (!pkg.devDependencies["@types/jest"]) pkg.devDependencies["@types/jest"] = "^29.5.14";
                  fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
                  EOF

                  (cd dist/sdks/typescript && npm install)
                  (cd dist/sdks/typescript && npm test)

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g python \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/python" \
                    --additional-properties=packageName=ce_rise_hex_core_sdk,projectName=ce-rise-hex-core-sdk,packageVersion="${PY_VERSION}"

                  # Replace generator placeholder tests (pass-only stubs) with executable smoke tests.
                  rm -f dist/sdks/python/test/test_*_api.py dist/sdks/python/test/test_*.py || true
                  mkdir -p dist/sdks/python/test
                  cat > dist/sdks/python/test/test_smoke_client.py <<'EOF'
                  import unittest

                  from ce_rise_hex_core_sdk import ApiClient, Configuration
                  from ce_rise_hex_core_sdk.api.admin_api import AdminApi
                  from ce_rise_hex_core_sdk.api.discovery_api import DiscoveryApi
                  from ce_rise_hex_core_sdk.api.models_api import ModelsApi


                  class TestSmokeClient(unittest.TestCase):
                      def test_api_surfaces_exist(self):
                          cfg = Configuration(host="http://localhost:8080")
                          client = ApiClient(cfg)

                          self.assertIsNotNone(AdminApi(client))
                          self.assertIsNotNone(DiscoveryApi(client))
                          self.assertIsNotNone(ModelsApi(client))

                      def test_default_configuration_has_host(self):
                          cfg = Configuration()
                          self.assertTrue(isinstance(cfg.host, str))
                          self.assertNotEqual(cfg.host, "")


                  if __name__ == "__main__":
                      unittest.main()
                  EOF

                  # Ensure package version is consistent across generated metadata files.
                  python - <<'EOF'
                  import os
                  import re
                  from pathlib import Path

                  root = Path("dist/sdks/python")
                  init_py = (root / "ce_rise_hex_core_sdk" / "__init__.py").read_text()
                  pyproject = (root / "pyproject.toml").read_text()
                  setup_py = (root / "setup.py").read_text()
                  expected = os.environ["OPENAPI_VERSION"]

                  def extract(pattern, text, label, required=True):
                      m = re.search(pattern, text, re.M)
                      if not m:
                          if required:
                              raise SystemExit(f"Could not extract version from {label}")
                          return None
                      return m.group(1)

                  v_init = extract(r'__version__\\s*=\\s*[\"\\\']([^\"\\\']+)[\"\\\']', init_py, "__init__.py", required=False)
                  v_pyproject = extract(r'^version\\s*=\\s*[\"\\\']([^\"\\\']+)[\"\\\']', pyproject, "pyproject.toml", required=False)
                  v_setup = extract(r'version\\s*=\\s*[\"\\\']([^\"\\\']+)[\"\\\']', setup_py, "setup.py")

                  if v_setup != expected:
                      raise SystemExit(
                          f"Python SDK version mismatch: setup.py={v_setup}, expected(openapi)={expected}"
                      )
                  if v_pyproject is not None and v_pyproject != expected:
                      raise SystemExit(
                          f"Python SDK version mismatch: pyproject={v_pyproject}, expected(openapi)={expected}"
                      )
                  if v_init is not None and v_init != expected:
                      raise SystemExit(
                          f"Python SDK version mismatch: __init__={v_init}, expected(openapi)={expected}"
                      )
                  print(f"Python SDK version synchronized: {expected}")
                  EOF

                  # Basic package quality gate for generated Python SDK.
                  (cd dist/sdks/python && python -m unittest discover -s test -v)

            - name: Publish Go SDK to external repo
              env:
                  GO_SDK_REPO: ${{ vars.GO_SDK_REPO }}
                  GO_SDK_BRANCH: ${{ vars.GO_SDK_BRANCH }}
                  GO_SDK_GIT_HOST: ${{ vars.GO_SDK_GIT_HOST }}
                  GO_SDK_TARGET_DIR: ${{ vars.GO_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${GO_SDK_BRANCH:-main}"
                  HOST="${GO_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${GO_SDK_TARGET_DIR:-.}"
                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/go"

                  if [ -z "${GO_SDK_REPO:-}" ]; then
                    echo "GO_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-go)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${GO_SDK_REPO}.git" /tmp/go-sdk-repo
                  cd /tmp/go-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  mkdir -p "${TARGET_DIR}"
                  for d in api model docs test; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  rm -f "${TARGET_DIR}"/*.go "${TARGET_DIR}/go.mod" "${TARGET_DIR}/go.sum"
                  for d in api model docs test; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done
                  shopt -s nullglob
                  for f in "${SRC_DIR}"/*.go "${SRC_DIR}/go.mod" "${SRC_DIR}/go.sum"; do
                    if [ -e "${f}" ]; then
                      cp "${f}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in api model docs test go.mod go.sum *.go; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No Go SDK changes to publish"
                  else
                    git commit -m "chore(sdk-go): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                    git push origin "${BRANCH}"
                  fi

            - name: Publish TypeScript SDK to external repo
              env:
                  TS_SDK_REPO: ${{ vars.TS_SDK_REPO }}
                  TS_SDK_BRANCH: ${{ vars.TS_SDK_BRANCH }}
                  TS_SDK_GIT_HOST: ${{ vars.TS_SDK_GIT_HOST }}
                  TS_SDK_TARGET_DIR: ${{ vars.TS_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${TS_SDK_BRANCH:-main}"
                  HOST="${TS_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${TS_SDK_TARGET_DIR:-.}"
                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/typescript"

                  if [ -z "${TS_SDK_REPO:-}" ]; then
                    echo "TS_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-typescript)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${TS_SDK_REPO}.git" /tmp/ts-sdk-repo
                  cd /tmp/ts-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  mkdir -p "${TARGET_DIR}"
                  for d in src test tests docs; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  for d in src test tests docs; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in src test tests docs; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No TypeScript SDK changes to publish"
                  else
                    git commit -m "chore(sdk-ts): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                    git push origin "${BRANCH}"
                  fi

            - name: Publish Python SDK to external repo
              env:
                  PY_SDK_REPO: ${{ vars.PY_SDK_REPO }}
                  PY_SDK_BRANCH: ${{ vars.PY_SDK_BRANCH }}
                  PY_SDK_GIT_HOST: ${{ vars.PY_SDK_GIT_HOST }}
                  PY_SDK_TARGET_DIR: ${{ vars.PY_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${PY_SDK_BRANCH:-main}"
                  HOST="${PY_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${PY_SDK_TARGET_DIR:-.}"
                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/python"

                  if [ -z "${PY_SDK_REPO:-}" ]; then
                    echo "PY_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-python)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${PY_SDK_REPO}.git" /tmp/py-sdk-repo
                  cd /tmp/py-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  mkdir -p "${TARGET_DIR}"
                  for d in ce_rise_hex_core_sdk test docs; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  for d in ce_rise_hex_core_sdk test docs; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done
                  for f in pyproject.toml setup.py setup.cfg requirements.txt; do
                    if [ -f "${SRC_DIR}/${f}" ]; then
                      cp "${SRC_DIR}/${f}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in ce_rise_hex_core_sdk test docs pyproject.toml setup.py setup.cfg requirements.txt; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No Python SDK changes to publish"
                  else
                    git commit -m "chore(sdk-py): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                    git push origin "${BRANCH}"
                  fi
