name: Sync Go SDK on OpenAPI Change

on:
    push:
        branches:
            - "**"
        paths:
            - "crates/api/src/openapi.json"

jobs:
    sync-go-sdk:
        runs-on: codeberg-small
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Java
              uses: https://github.com/actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Node.js
              uses: https://github.com/actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Generate Go SDK from OpenAPI
              run: |
                  set -euo pipefail
                  VERSION="0.0.0-commit.${GITHUB_RUN_NUMBER}"
                  mkdir -p dist/sdks
                  npx -y @openapitools/openapi-generator-cli@2.15.3 version-manager set 7.10.0
                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g go \
                    -i "crates/api/src/openapi.json" \
                    -o "dist/sdks/go" \
                    --additional-properties=packageName=hexcoresdk,enumClassPrefix=true,packageVersion="${VERSION}"

            - name: Publish Go SDK to external repo
              env:
                  GO_SDK_REPO: ${{ vars.GO_SDK_REPO }}
                  GO_SDK_BRANCH: ${{ vars.GO_SDK_BRANCH }}
                  GO_SDK_GIT_HOST: ${{ vars.GO_SDK_GIT_HOST }}
                  GO_SDK_TARGET_DIR: ${{ vars.GO_SDK_TARGET_DIR }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  BRANCH="${GO_SDK_BRANCH:-main}"
                  HOST="${GO_SDK_GIT_HOST:-codeberg.org}"
                  TARGET_DIR="${GO_SDK_TARGET_DIR:-.}"

                  if [ -z "${GO_SDK_REPO:-}" ]; then
                    echo "GO_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-go)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${GO_SDK_REPO}.git" /tmp/go-sdk-repo
                  cd /tmp/go-sdk-repo
                  git checkout "${BRANCH}" || git checkout -b "${BRANCH}"

                  SRC_DIR="$GITHUB_WORKSPACE/dist/sdks/go"
                  mkdir -p "${TARGET_DIR}"

                  # Clean only allowlisted generated paths in destination.
                  for d in api model .openapi-generator docs test; do
                    rm -rf "${TARGET_DIR}/${d}"
                  done
                  rm -f "${TARGET_DIR}"/*.go "${TARGET_DIR}/go.mod" "${TARGET_DIR}/go.sum"

                  # Copy only allowlisted generated paths from source.
                  for d in api model .openapi-generator docs test; do
                    if [ -d "${SRC_DIR}/${d}" ]; then
                      cp -R "${SRC_DIR}/${d}" "${TARGET_DIR}/"
                    fi
                  done
                  shopt -s nullglob
                  for f in "${SRC_DIR}"/*.go "${SRC_DIR}/go.mod" "${SRC_DIR}/go.sum"; do
                    if [ -e "${f}" ]; then
                      cp "${f}" "${TARGET_DIR}/"
                    fi
                  done

                  git config user.name "ce-rise-bot"
                  git config user.email "ce-rise-bot@users.noreply.codeberg.org"
                  if [ "${TARGET_DIR}" = "." ]; then
                    for p in api model .openapi-generator docs test go.mod go.sum *.go; do
                      if [ -e "$p" ]; then
                        git add -A "$p"
                      fi
                    done
                  else
                    git add "${TARGET_DIR}"
                  fi
                  if git diff --cached --quiet; then
                    echo "No Go SDK changes to publish"
                    exit 0
                  fi
                  git commit -m "chore(sdk-go): sync generated SDK from OpenAPI (${GITHUB_SHA::8})"
                  git push origin "${BRANCH}"
