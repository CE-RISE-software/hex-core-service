name: Publish Docs to Codeberg Pages

# Trigger on every push to any branch and on version tags.
# The pages branch is always updated to the latest docs from main.
# On a version tag, the same built output is also pushed to a
# versioned snapshot branch (pages-v*) for historical reference.
on:
    push:
        branches:
            - "**"
        tags:
            - "v*.*.*"

jobs:
    pages:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: https://github.com/actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install mdBook
              run: |
                  curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
                    | tar -xz --directory /usr/local/bin

            - name: Build docs
              run: mdbook build docs/

            - name: Configure git
              run: |
                  git config --global user.email "ci@noreply.codeberg.org"
                  git config --global user.name "Forgejo CI"

            - name: Deploy to pages branch
              run: |
                  cd docs/book
                  git init
                  git add -A
                  git commit -m "docs: publish ${GITHUB_REF_NAME} @ ${GITHUB_SHA::8}"
                  git push --force \
                    "https://${GITHUB_ACTOR}:${FORGEJO_TOKEN}@codeberg.org/${GITHUB_REPOSITORY}.git" \
                    HEAD:pages
              env:
                  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}

            - name: Tag versioned snapshot on pages branch
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  cd docs/book
                  git push --force \
                    "https://${GITHUB_ACTOR}:${FORGEJO_TOKEN}@codeberg.org/${GITHUB_REPOSITORY}.git" \
                    HEAD:pages-${GITHUB_REF_NAME}
              env:
                  FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
