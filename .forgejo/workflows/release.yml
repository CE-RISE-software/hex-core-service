name: Release

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    main-release:
        runs-on: codeberg-tiny
        outputs:
            version: ${{ steps.tag.outputs.VERSION }}
            release_id: ${{ steps.ensure_release.outputs.RELEASE_ID }}
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Create or reuse repository release
              id: ensure_release
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}"
                  AUTH_HEADER="Authorization: token ${CI_PUSH_TOKEN}"

                  STATUS="$(curl -sS -o /tmp/release-check.json -w '%{http_code}' \
                    -H "${AUTH_HEADER}" \
                    "${API}/releases/tags/${VERSION}")"

                  if [ "${STATUS}" = "200" ]; then
                    RELEASE_ID="$(python3 - <<'PY'
                  import json
                  from pathlib import Path
                  print(json.loads(Path('/tmp/release-check.json').read_text())['id'])
                  PY
                    )"
                    echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "${STATUS}" != "404" ]; then
                    echo "Unexpected response while checking release: HTTP ${STATUS}"
                    cat /tmp/release-check.json || true
                    exit 1
                  fi

                  PRERELEASE=false
                  if [[ "${VERSION}" == *-* ]]; then PRERELEASE=true; fi

                  curl -fsS -X POST "${API}/releases" \
                    -H "${AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"tag_name\": \"${VERSION}\",
                      \"name\": \"Release ${VERSION}\",
                      \"body\": \"Automated release for ${VERSION}.\",
                      \"draft\": false,
                      \"prerelease\": ${PRERELEASE}
                    }" \
                    -o /tmp/release-create.json

                  RELEASE_ID="$(python3 - <<'PY'
                  import json
                  from pathlib import Path
                  print(json.loads(Path('/tmp/release-create.json').read_text())['id'])
                  PY
                  )"
                  echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

    cli-binaries:
        runs-on: codeberg-medium
        needs:
            - main-release
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-musl
                      archive_suffix: linux-x86_64
                      binary_suffix: ""
                    - target: x86_64-apple-darwin
                      archive_suffix: macos-x86_64
                      binary_suffix: ""
                    - target: x86_64-pc-windows-gnu
                      archive_suffix: windows-x86_64
                      binary_suffix: .exe

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              run: |
                  set -euo pipefail
                  if ! command -v rustup >/dev/null 2>&1; then
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi
                  . "$HOME/.cargo/env"
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustc --version
                  cargo --version

            - name: Install Zig
              run: |
                  set -euo pipefail
                  ZIG_VERSION=0.13.0
                  curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
                  mkdir -p /tmp/zig
                  tar -xf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
                  echo "/tmp/zig" >> "$GITHUB_PATH"
                  /tmp/zig/zig version

            - name: Install target toolchain
              run: |
                  set -euo pipefail
                  . "$HOME/.cargo/env"
                  rustup target add ${{ matrix.target }}

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Install cargo-zigbuild
              run: cargo install --locked cargo-zigbuild

            - name: Extract version tag
              id: tag
              run: echo "VERSION=${{ needs.main-release.outputs.version }}" >> $GITHUB_OUTPUT

            - name: Build hex-cli
              run: cargo zigbuild --release -p hex-cli --target ${{ matrix.target }}
              env:
                  RUSTFLAGS: "-D warnings"

            - name: Package archive
              run: |
                  set -euo pipefail
                  BIN_NAME="hex${{ matrix.binary_suffix }}"
                  DIST_NAME="hex-cli-${{ steps.tag.outputs.VERSION }}-${{ matrix.archive_suffix }}"
                  mkdir -p dist
                  cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
                  (cd dist && tar -czf "${DIST_NAME}.tar.gz" "${BIN_NAME}")

            - name: Attach CLI archive to Codeberg release
              env:
                  RELEASE_ID: ${{ needs.main-release.outputs.release_id }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
                  ASSET_NAME: hex-cli-${{ steps.tag.outputs.VERSION }}-${{ matrix.archive_suffix }}.tar.gz
              run: |
                  set -euo pipefail
                  API="${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
                  AUTH_HEADER="Authorization: token ${CI_PUSH_TOKEN}"

                  STATUS="$(curl -sS -o /tmp/release-assets.json -w '%{http_code}' \
                    -H "${AUTH_HEADER}" \
                    "${API}/assets")"
                  if [ "${STATUS}" != "200" ]; then
                    echo "Could not list release assets: HTTP ${STATUS}"
                    cat /tmp/release-assets.json || true
                    exit 1
                  fi

                  EXISTING_ID="$(python3 - <<'PY'
                  import json
                  import os
                  from pathlib import Path
                  name = os.environ["ASSET_NAME"]
                  for asset in json.loads(Path('/tmp/release-assets.json').read_text()):
                      if asset.get('name') == name:
                          print(asset['id'])
                          break
                  PY
                  )"

                  if [ -n "${EXISTING_ID}" ]; then
                    curl -fsS -X DELETE \
                      -H "${AUTH_HEADER}" \
                      "${API}/assets/${EXISTING_ID}"
                  fi

                  curl -fsS -X POST \
                    -H "${AUTH_HEADER}" \
                    -F "attachment=@dist/${ASSET_NAME}" \
                    "${API}/assets?name=${ASSET_NAME}"

    docker-build-and-push:
        runs-on: codeberg-medium
        container:
            image: gcr.io/kaniko-project/executor:debug
        steps:
            - name: Prepare build context
              run: |
                  set -euo pipefail
                  if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -f "${GITHUB_WORKSPACE}/Dockerfile" ]; then
                    echo "CONTEXT_DIR=${GITHUB_WORKSPACE}" >> "$GITHUB_ENV"
                    exit 0
                  fi
                  CANDIDATE="$(find /workspace -maxdepth 6 -type f -name Dockerfile | head -n 1 || true)"
                  if [ -n "${CANDIDATE}" ]; then
                    echo "CONTEXT_DIR=$(dirname "${CANDIDATE}")" >> "$GITHUB_ENV"
                    exit 0
                  fi
                  echo "Dockerfile not found in mounted workspace, downloading archive for ${GITHUB_SHA}"
                  ARCHIVE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
                  mkdir -p /tmp/context
                  wget -qO /tmp/repo.tar.gz "${ARCHIVE_URL}"
                  tar -xzf /tmp/repo.tar.gz -C /tmp/context --strip-components=1
                  if [ ! -f /tmp/context/Dockerfile ]; then
                    echo "Could not find Dockerfile after archive download."
                    ls -la /
                    ls -la /workspace || true
                    find /workspace -maxdepth 6 -type d -print || true
                    ls -la /tmp/context || true
                    exit 1
                  fi
                  echo "CONTEXT_DIR=/tmp/context" >> "$GITHUB_ENV"

            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Build and push image with Kaniko
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
                  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
              run: |
                  set -euo pipefail
                  IMAGE_BASE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/hex-core-service"
                  AUTH="$(printf '%s:%s' "${REGISTRY_USERNAME}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')"
                  mkdir -p /kaniko/.docker
                  cat > /kaniko/.docker/config.json <<EOF
                  {"auths":{"${REGISTRY_HOST}":{"auth":"${AUTH}"}}}
                  EOF
                  /kaniko/executor \
                    --context "${CONTEXT_DIR}" \
                    --dockerfile "${CONTEXT_DIR}/Dockerfile" \
                    --destination "${IMAGE_BASE}:${VERSION}"

    docker-tag-latest:
        runs-on: codeberg-small
        needs:
            - docker-build-and-push
        container:
            image: gcr.io/go-containerregistry/crane:debug
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Tag latest with Crane
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
                  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
              run: |
                  set -euo pipefail
                  IMAGE_BASE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/hex-core-service"
                  crane auth login -u "${REGISTRY_USERNAME}" -p "${REGISTRY_PASSWORD}" "${REGISTRY_HOST}"
                  crane copy "${IMAGE_BASE}:${VERSION}" "${IMAGE_BASE}:latest"

    sdk-go-forward-tag:
        runs-on: codeberg-tiny
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Forward release tag to Go SDK repository
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  GO_SDK_REPO: ${{ vars.GO_SDK_REPO }}
                  GO_SDK_GIT_HOST: ${{ vars.GO_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${GO_SDK_GIT_HOST:-codeberg.org}"

                  if [ -z "${GO_SDK_REPO:-}" ]; then
                    echo "GO_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-go)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${GO_SDK_REPO}.git" /tmp/go-sdk-repo
                  cd /tmp/go-sdk-repo
                  git config user.name "hex-core-service release bot"
                  git config user.email "noreply@ce-rise.eu"

                  if git show-ref --tags --verify --quiet "refs/tags/${VERSION}"; then
                    echo "Tag ${VERSION} already exists in ${GO_SDK_REPO}; skipping."
                    exit 0
                  fi

                  git tag -a "${VERSION}" -m "Release ${VERSION}"
                  git push origin "refs/tags/${VERSION}"

            - name: Create Go SDK release from forwarded tag
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  GO_SDK_REPO: ${{ vars.GO_SDK_REPO }}
                  GO_SDK_GIT_HOST: ${{ vars.GO_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${GO_SDK_GIT_HOST:-codeberg.org}"
                  API="https://${HOST}/api/v1/repos/${GO_SDK_REPO}"
                  AUTH_HEADER="Authorization: token ${CI_PUSH_TOKEN}"

                  STATUS="$(curl -sS -o /tmp/go-release-check.json -w '%{http_code}' \
                    -H "${AUTH_HEADER}" \
                    "${API}/releases/tags/${VERSION}")"
                  if [ "${STATUS}" = "200" ]; then
                    echo "Release ${VERSION} already exists in ${GO_SDK_REPO}; skipping."
                    exit 0
                  fi
                  if [ "${STATUS}" != "404" ]; then
                    echo "Unexpected response while checking release: HTTP ${STATUS}"
                    cat /tmp/go-release-check.json || true
                    exit 1
                  fi

                  PRERELEASE=false
                  if [[ "${VERSION}" == *-* ]]; then PRERELEASE=true; fi

                  curl -fsS -X POST "${API}/releases" \
                    -H "${AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"tag_name\": \"${VERSION}\",
                      \"name\": \"Release ${VERSION}\",
                      \"body\": \"Automated release created from forwarded tag ${VERSION}.\",
                      \"draft\": false,
                      \"prerelease\": ${PRERELEASE}
                    }"

    sdk-ts-forward-tag:
        runs-on: codeberg-tiny
