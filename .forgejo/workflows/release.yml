name: Release

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    cli-binaries:
        runs-on: codeberg-medium
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-musl
                      archive_suffix: linux-x86_64
                      binary_suffix: ""
                    - target: x86_64-apple-darwin
                      archive_suffix: macos-x86_64
                      binary_suffix: ""
                    - target: x86_64-pc-windows-gnu
                      archive_suffix: windows-x86_64
                      binary_suffix: .exe

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              run: |
                  set -euo pipefail
                  if ! command -v rustup >/dev/null 2>&1; then
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi
                  . "$HOME/.cargo/env"
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustc --version
                  cargo --version

            - name: Install Zig
              run: |
                  set -euo pipefail
                  ZIG_VERSION=0.13.0
                  curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
                  mkdir -p /tmp/zig
                  tar -xf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
                  echo "/tmp/zig" >> "$GITHUB_PATH"
                  /tmp/zig/zig version

            - name: Install target toolchain
              run: |
                  set -euo pipefail
                  . "$HOME/.cargo/env"
                  rustup target add ${{ matrix.target }}

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Install cargo-zigbuild
              run: cargo install --locked cargo-zigbuild

            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Build hex-cli
              run: cargo zigbuild --release -p hex-cli --target ${{ matrix.target }}
              env:
                  RUSTFLAGS: "-D warnings"

            - name: Package archive
              run: |
                  set -euo pipefail
                  BIN_NAME="hex${{ matrix.binary_suffix }}"
                  DIST_NAME="hex-cli-${{ steps.tag.outputs.VERSION }}-${{ matrix.archive_suffix }}"
                  mkdir -p dist
                  cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
                  (cd dist && tar -czf "${DIST_NAME}.tar.gz" "${BIN_NAME}")

            - name: Upload CLI archive
              uses: https://github.com/actions/upload-artifact@v3
              with:
                  name: hex-cli-${{ steps.tag.outputs.VERSION }}-${{ matrix.archive_suffix }}
                  path: |
                      dist/*.tar.gz

    release:
        runs-on: codeberg-medium
        needs:
            - cli-binaries

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              run: |
                  set -euo pipefail
                  if ! command -v rustup >/dev/null 2>&1; then
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi
                  . "$HOME/.cargo/env"
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustc --version
                  cargo --version

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Run full test suite
              run: cargo test --features integration-tests
              env:
                  RUSTFLAGS: "-D warnings"

            - name: Build release binary
              run: cargo build --release -p hex-api

            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    docker-build-and-push:
        runs-on: codeberg-medium
        needs:
            - release
        container:
            image: gcr.io/kaniko-project/executor:debug
        steps:
            - name: Prepare build context
              run: |
                  set -euo pipefail
                  if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -f "${GITHUB_WORKSPACE}/Dockerfile" ]; then
                    echo "CONTEXT_DIR=${GITHUB_WORKSPACE}" >> "$GITHUB_ENV"
                    exit 0
                  fi
                  CANDIDATE="$(find /workspace -maxdepth 6 -type f -name Dockerfile | head -n 1 || true)"
                  if [ -n "${CANDIDATE}" ]; then
                    echo "CONTEXT_DIR=$(dirname "${CANDIDATE}")" >> "$GITHUB_ENV"
                    exit 0
                  fi
                  echo "Dockerfile not found in mounted workspace, downloading archive for ${GITHUB_SHA}"
                  ARCHIVE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
                  mkdir -p /tmp/context
                  wget -qO /tmp/repo.tar.gz "${ARCHIVE_URL}"
                  tar -xzf /tmp/repo.tar.gz -C /tmp/context --strip-components=1
                  if [ ! -f /tmp/context/Dockerfile ]; then
                    echo "Could not find Dockerfile after archive download."
                    ls -la /
                    ls -la /workspace || true
                    find /workspace -maxdepth 6 -type d -print || true
                    ls -la /tmp/context || true
                    exit 1
                  fi
                  echo "CONTEXT_DIR=/tmp/context" >> "$GITHUB_ENV"

            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Build and push image with Kaniko
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
                  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
              run: |
                  set -euo pipefail
                  IMAGE_BASE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/hex-core-service"
                  AUTH="$(printf '%s:%s' "${REGISTRY_USERNAME}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')"
                  mkdir -p /kaniko/.docker
                  cat > /kaniko/.docker/config.json <<EOF
                  {"auths":{"${REGISTRY_HOST}":{"auth":"${AUTH}"}}}
                  EOF
                  /kaniko/executor \
                    --context "${CONTEXT_DIR}" \
                    --dockerfile "${CONTEXT_DIR}/Dockerfile" \
                    --destination "${IMAGE_BASE}:${VERSION}" \
                    --destination "${IMAGE_BASE}:${GITHUB_SHA}"

    docker-tag-latest:
        runs-on: codeberg-medium
        needs:
            - docker-build-and-push
        container:
            image: gcr.io/go-containerregistry/crane:debug
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Tag latest with Crane
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
                  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
                  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
                  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
              run: |
                  set -euo pipefail
                  IMAGE_BASE="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/hex-core-service"
                  crane auth login -u "${REGISTRY_USERNAME}" -p "${REGISTRY_PASSWORD}" "${REGISTRY_HOST}"
                  crane copy "${IMAGE_BASE}:${VERSION}" "${IMAGE_BASE}:latest"

    cli-distribution:
        runs-on: codeberg-tiny
        needs: cli-binaries
        if: ${{ vars.CLI_DISTRIBUTION_ENABLED == 'true' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              run: |
                  set -euo pipefail
                  if ! command -v rustup >/dev/null 2>&1; then
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi
                  . "$HOME/.cargo/env"
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustc --version
                  cargo --version

            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Download Linux CLI archive
              uses: https://github.com/actions/download-artifact@v3
              with:
                  name: hex-cli-${{ steps.tag.outputs.VERSION }}-linux-x86_64
                  path: dist/archives/linux

            - name: Download macOS CLI archive
              uses: https://github.com/actions/download-artifact@v3
              with:
                  name: hex-cli-${{ steps.tag.outputs.VERSION }}-macos-x86_64
                  path: dist/archives/macos

            - name: Download Windows CLI archive
              uses: https://github.com/actions/download-artifact@v3
              with:
                  name: hex-cli-${{ steps.tag.outputs.VERSION }}-windows-x86_64
                  path: dist/archives/windows

            - name: Normalize archive layout
              run: |
                  set -euo pipefail
                  mkdir -p dist/archives
                  cp dist/archives/linux/*.tar.gz dist/archives/
                  cp dist/archives/macos/*.tar.gz dist/archives/
                  cp dist/archives/windows/*.tar.gz dist/archives/

            - name: Compute archive checksums
              run: |
                  set -euo pipefail
                  cd dist/archives
                  sha256sum hex-cli-${{ steps.tag.outputs.VERSION }}-linux-x86_64.tar.gz > linux.sha256
                  sha256sum hex-cli-${{ steps.tag.outputs.VERSION }}-macos-x86_64.tar.gz > macos.sha256
                  sha256sum hex-cli-${{ steps.tag.outputs.VERSION }}-windows-x86_64.tar.gz > windows.sha256

            - name: Publish hex-cli to crates.io (optional)
              if: ${{ vars.CLI_CRATES_IO_PUBLISH == 'true' }}
              run: cargo publish -p hex-cli --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

            - name: Generate Homebrew and Scoop manifests
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  RELEASE_BASE_URL: ${{ vars.CLI_RELEASE_BASE_URL }}
              run: |
                  set -euo pipefail
                  mkdir -p dist/packages
                  VERSION_NO_V="${VERSION#v}"
                  if [ -z "${RELEASE_BASE_URL:-}" ]; then
                    echo "CLI_RELEASE_BASE_URL must be set when CLI_DISTRIBUTION_ENABLED=true"
                    exit 1
                  fi
                  BASE_URL="${RELEASE_BASE_URL}"
                  LINUX_SHA="$(cut -d' ' -f1 dist/archives/linux.sha256)"
                  MACOS_SHA="$(cut -d' ' -f1 dist/archives/macos.sha256)"
                  WINDOWS_SHA="$(cut -d' ' -f1 dist/archives/windows.sha256)"

                  cat > dist/packages/hex-cli.rb <<EOF
                  class HexCli < Formula
                    desc "CLI for CE-RISE Hex Core Service"
                    homepage "https://codeberg.org/CE-RISE-software/hex-core-service"
                    version "${VERSION_NO_V}"
                    on_macos do
                      url "${BASE_URL}/hex-cli-${VERSION}-macos-x86_64.tar.gz"
                      sha256 "${MACOS_SHA}"
                    end
                    on_linux do
                      url "${BASE_URL}/hex-cli-${VERSION}-linux-x86_64.tar.gz"
                      sha256 "${LINUX_SHA}"
                    end
                    def install
                      bin.install "hex-cli"
                    end
                  end
                  EOF

                  cat > dist/packages/hex-cli.scoop.json <<EOF
                  {
                    "version": "${VERSION_NO_V}",
                    "description": "CLI for CE-RISE Hex Core Service",
                    "homepage": "https://codeberg.org/CE-RISE-software/hex-core-service",
                    "license": "EUPL-1.2",
                    "url": "${BASE_URL}/hex-cli-${VERSION}-windows-x86_64.tar.gz",
                    "hash": "${WINDOWS_SHA}",
                    "bin": "hex-cli.exe"
                  }
                  EOF

            - name: Upload CLI distribution manifests
              uses: https://github.com/actions/upload-artifact@v3
              with:
                  name: hex-cli-distribution-${{ steps.tag.outputs.VERSION }}
                  path: |
                      dist/packages/hex-cli.rb
                      dist/packages/hex-cli.scoop.json

    sdk-go-forward-tag:
        runs-on: codeberg-tiny
        if: ${{ vars.SDK_GO_FORWARD_TAG_ENABLED == 'true' }}
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Forward release tag to Go SDK repository
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  GO_SDK_REPO: ${{ vars.GO_SDK_REPO }}
                  GO_SDK_GIT_HOST: ${{ vars.GO_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${GO_SDK_GIT_HOST:-codeberg.org}"

                  if [ -z "${GO_SDK_REPO:-}" ]; then
                    echo "GO_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-go)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${GO_SDK_REPO}.git" /tmp/go-sdk-repo
                  cd /tmp/go-sdk-repo

                  if git show-ref --tags --verify --quiet "refs/tags/${VERSION}"; then
                    echo "Tag ${VERSION} already exists in ${GO_SDK_REPO}; skipping."
                    exit 0
                  fi

                  git tag -a "${VERSION}" -m "Release ${VERSION}"
                  git push origin "refs/tags/${VERSION}"

    sdk-ts-forward-tag:
        runs-on: codeberg-tiny
        if: ${{ vars.SDK_TS_FORWARD_TAG_ENABLED == 'true' }}
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Forward release tag to TypeScript SDK repository
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  TS_SDK_REPO: ${{ vars.TS_SDK_REPO }}
                  TS_SDK_GIT_HOST: ${{ vars.TS_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${TS_SDK_GIT_HOST:-codeberg.org}"

                  if [ -z "${TS_SDK_REPO:-}" ]; then
                    echo "TS_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-typescript)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${TS_SDK_REPO}.git" /tmp/ts-sdk-repo
                  cd /tmp/ts-sdk-repo

                  if git show-ref --tags --verify --quiet "refs/tags/${VERSION}"; then
                    echo "Tag ${VERSION} already exists in ${TS_SDK_REPO}; skipping."
                    exit 0
                  fi

                  git tag -a "${VERSION}" -m "Release ${VERSION}"
                  git push origin "refs/tags/${VERSION}"

    sdk-py-forward-tag:
        runs-on: codeberg-tiny
        if: ${{ vars.SDK_PY_FORWARD_TAG_ENABLED == 'true' }}
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Forward release tag to Python SDK repository
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  PY_SDK_REPO: ${{ vars.PY_SDK_REPO }}
                  PY_SDK_GIT_HOST: ${{ vars.PY_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${PY_SDK_GIT_HOST:-codeberg.org}"

                  if [ -z "${PY_SDK_REPO:-}" ]; then
                    echo "PY_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-python)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${PY_SDK_REPO}.git" /tmp/py-sdk-repo
                  cd /tmp/py-sdk-repo

                  if git show-ref --tags --verify --quiet "refs/tags/${VERSION}"; then
                    echo "Tag ${VERSION} already exists in ${PY_SDK_REPO}; skipping."
                    exit 0
                  fi

                  git tag -a "${VERSION}" -m "Release ${VERSION}"
                  git push origin "refs/tags/${VERSION}"
