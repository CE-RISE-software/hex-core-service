                    echo "Tag ${VERSION} already exists in ${TS_SDK_REPO}; skipping."
                    exit 0
                  fi

                  git tag -a "${VERSION}" -m "Release ${VERSION}"
                  git push origin "refs/tags/${VERSION}"

            - name: Create TypeScript SDK release from forwarded tag
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  TS_SDK_REPO: ${{ vars.TS_SDK_REPO }}
                  TS_SDK_GIT_HOST: ${{ vars.TS_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${TS_SDK_GIT_HOST:-codeberg.org}"
                  API="https://${HOST}/api/v1/repos/${TS_SDK_REPO}"
                  AUTH_HEADER="Authorization: token ${CI_PUSH_TOKEN}"

                  STATUS="$(curl -sS -o /tmp/ts-release-check.json -w '%{http_code}' \
                    -H "${AUTH_HEADER}" \
                    "${API}/releases/tags/${VERSION}")"
                  if [ "${STATUS}" = "200" ]; then
                    echo "Release ${VERSION} already exists in ${TS_SDK_REPO}; skipping."
                    exit 0
                  fi
                  if [ "${STATUS}" != "404" ]; then
                    echo "Unexpected response while checking release: HTTP ${STATUS}"
                    cat /tmp/ts-release-check.json || true
                    exit 1
                  fi

                  PRERELEASE=false
                  if [[ "${VERSION}" == *-* ]]; then PRERELEASE=true; fi

                  curl -fsS -X POST "${API}/releases" \
                    -H "${AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"tag_name\": \"${VERSION}\",
                      \"name\": \"Release ${VERSION}\",
                      \"body\": \"Automated release created from forwarded tag ${VERSION}.\",
                      \"draft\": false,
                      \"prerelease\": ${PRERELEASE}
                    }"

    sdk-py-forward-tag:
        runs-on: codeberg-tiny
        steps:
            - name: Extract version tag
              id: tag
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Forward release tag to Python SDK repository
              env:
                  VERSION: ${{ steps.tag.outputs.VERSION }}
                  PY_SDK_REPO: ${{ vars.PY_SDK_REPO }}
                  PY_SDK_GIT_HOST: ${{ vars.PY_SDK_GIT_HOST }}
                  CI_PUSH_TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
              run: |
                  set -euo pipefail
                  HOST="${PY_SDK_GIT_HOST:-codeberg.org}"

                  if [ -z "${PY_SDK_REPO:-}" ]; then
                    echo "PY_SDK_REPO is required (example: CE-RISE-software/hex-core-sdk-python)"
                    exit 1
                  fi

                  git clone "https://${GITHUB_ACTOR}:${CI_PUSH_TOKEN}@${HOST}/${PY_SDK_REPO}.git" /tmp/py-sdk-repo
                  cd /tmp/py-sdk-repo
