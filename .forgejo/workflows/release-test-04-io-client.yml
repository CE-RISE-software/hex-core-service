name: Release Test 04 - IO Typed Client

on:
    workflow_dispatch:

jobs:
    io-http-client-stub-eval:
        runs-on: codeberg-medium
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Setup Java
              uses: https://github.com/actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Node.js
              uses: https://github.com/actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Generate typed Rust IO adapter client stub
              env:
                  VERSION: test-io-client-${{ github.run_number }}
              run: |
                  set -euo pipefail
                  VERSION_NO_V="${VERSION#v}"
                  mkdir -p dist/openapi dist/io-http-client
                  cp crates/io-http/src/io_adapter_openapi.json "dist/openapi/io-adapter-openapi-${VERSION}.json"

                  npx -y @openapitools/openapi-generator-cli@2.15.3 version-manager set 7.10.0
                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g rust \
                    -i "dist/openapi/io-adapter-openapi-${VERSION}.json" \
                    -o "dist/io-http-client/rust-client" \
                    --additional-properties=packageName=hex_io_adapter_client,packageVersion="${VERSION_NO_V}",library=reqwest

                  cat > dist/io-http-client/evaluation.md <<EOF
                  # IO HTTP typed client evaluation

                  - Generated from io-adapter OpenAPI.
                  - Output path: dist/io-http-client/rust-client
                  - Result: generation completed.
                  EOF

            - name: Upload IO HTTP typed client eval artifact
              uses: https://github.com/actions/upload-artifact@v3
              with:
                  name: release-test-io-client-${{ github.run_number }}
                  path: dist/io-http-client
