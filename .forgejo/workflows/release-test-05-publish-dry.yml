name: Release Test 05 - Publish Dry Runs

on:
    workflow_dispatch:

jobs:
    publish-dry-checks:
        runs-on: codeberg-medium
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main

            - name: Install Rust toolchain
              run: |
                  set -euo pipefail
                  if ! command -v rustup >/dev/null 2>&1; then
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
                  fi
                  . "$HOME/.cargo/env"
                  rustup toolchain install stable --profile minimal
                  rustup default stable
                  rustc --version
                  cargo --version

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.23"

            - name: Generate SDKs locally for dry-run publishing checks
              env:
                  VERSION: test-publish-dry-${{ github.run_number }}
              run: |
                  set -euo pipefail
                  NPM_VERSION="0.0.0-test.${{ github.run_number }}"
                  PYTHON_VERSION="0.0.0.dev${{ github.run_number }}"
                  GO_VERSION="0.0.0-test.${{ github.run_number }}"
                  mkdir -p dist/openapi dist/sdks
                  cp crates/api/src/openapi.json "dist/openapi/openapi-${VERSION}.json"

                  npx -y @openapitools/openapi-generator-cli@2.15.3 version-manager set 7.10.0
                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g typescript-fetch \
                    -i "dist/openapi/openapi-${VERSION}.json" \
                    -o "dist/sdks/typescript" \
                    --additional-properties=npmName=@ce-rise/hex-core-sdk,npmVersion="${NPM_VERSION}",supportsES6=true,typescriptThreePlus=true

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g python \
                    -i "dist/openapi/openapi-${VERSION}.json" \
                    -o "dist/sdks/python" \
                    --additional-properties=packageName=ce_rise_hex_core_sdk,projectName=ce-rise-hex-core-sdk,packageVersion="${PYTHON_VERSION}"

                  npx -y @openapitools/openapi-generator-cli@2.15.3 generate \
                    -g go \
                    -i "dist/openapi/openapi-${VERSION}.json" \
                    -o "dist/sdks/go" \
                    --additional-properties=packageName=hexcoresdk,enumClassPrefix=true,packageVersion="${GO_VERSION}"

            - name: Cargo publish dry run
              run: cargo publish -p hex-cli --dry-run

            - name: NPM publish dry run
              run: |
                  set -euo pipefail
                  cd dist/sdks/typescript
                  npm publish --dry-run

            - name: Build + twine check (PyPI dry run)
              run: |
                  set -euo pipefail
                  python -m pip install --upgrade pip build twine
                  cd dist/sdks/python
                  python -m build
                  python -m twine check dist/*

            - name: Go module sanity check
              run: |
                  set -euo pipefail
                  cd dist/sdks/go
                  test -f go.mod
                  go list ./...
